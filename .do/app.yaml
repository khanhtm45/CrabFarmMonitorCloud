# DigitalOcean App Platform — deploy từ GitHub (không Docker)
# https://docs.digitalocean.com/products/app-platform/reference/app-spec/
#
# Sau khi push GitHub: Create App → GitHub → chọn repo → App Platform đọc file này.
# Liên kết Managed PostgreSQL trong UI → biến DATABASE_URL tự inject (hoặc set thủ công).

name: crab-farm-cloud
region: sgp

services:
  - name: api
    github:
      repo: khanhtm45/CrabFarmMonitorCloud
      branch: main
      deploy_on_push: true
    source_dir: /
    environment_slug: dotnet
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    build_command: dotnet publish src/CrabFarmMonitor.Cloud/CrabFarmMonitor.Cloud.csproj -c Release -o /tmp/out
    run_command: dotnet /tmp/out/CrabFarmMonitor.Cloud.dll
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: PORT
        value: "8080"
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:8080
      # Liên kết DB trong DO UI hoặc dán chuỗi Npgsql (không commit password):
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: TELEMETRY_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: DEV_ADMIN_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: DEFAULT_FARM_ID
        value: "11111111-1111-1111-1111-111111111111"
      - key: DEV_ADMIN_EMAIL
        value: admin@iras.local
      - key: TELEMETRY_SAMPLES_ENABLED
        value: "true"
      - key: TELEMETRY_SAMPLES_RETENTION_DAYS
        value: "7"
      - key: CORS_ORIGINS
        value: "https://YOUR-FRONTEND.ondigitalocean.app,http://localhost:3000"
      # DigitalOcean Spaces (khuyến nghị thay MinIO trên App Platform):
      # - key: S3_ENDPOINT
      #   value: https://sgp1.digitaloceanspaces.com
      # - key: S3_BUCKET
      #   value: ras-hdf5
      # - key: S3_ACCESS_KEY
      #   scope: RUN_TIME
      #   type: SECRET
      # - key: S3_SECRET_KEY
      #   scope: RUN_TIME
      #   type: SECRET
      # - key: S3_USE_SSL
      #   value: "true"
      # - key: S3_REGION
      #   value: sgp1
